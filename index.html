    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }
        
        .card-transition {
            transition-property: all;
            transition-duration: 500ms;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        html, body {
            width: 100%;
            overflow-x: hidden;
            background: #0a0e27;
        }

        .hero-bg {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1629 100%);
            position: relative;
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .player-card-bg {
            background: linear-gradient(145deg, #1a1f3a 0%, #0f1629 100%);
            border: 2px solid rgba(16, 185, 129, 0.3);
        }
        .player-card-img { position: relative; overflow: hidden; }
        .player-card-img::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(10, 14, 39, 0.9) 0%, transparent 100%);
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-effect {
            background: rgba(15, 22, 41, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .video-hover { transition: all 0.3s ease; }
        .video-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }

        .shimmer { position: relative; overflow: hidden; }
        .shimmer::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }

        @media (max-height: 750px) {
            .cards-container-height { height: 340px !important; }
            #cards-container > div { max-width: 280px !important; }
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ── Swipeable section ── */
        .swipeable-outer {
            overflow: hidden;
            position: relative;
        }
        .swipeable-track {
            display: flex;
            width: 200%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .swipeable-panel {
            width: 50%;
            flex-shrink: 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── Section tab bar ── */
        .section-tab {
            position: relative;
            padding-bottom: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: color 0.2s;
            cursor: pointer;
        }
        .section-tab.active { color: white; }
        .section-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: #10b981;
            border-radius: 2px;
        }
        .section-tab:not(.active) { color: rgba(255,255,255,0.4); }

        /* ── Player profile bottom sheet ── */
        #player-profile-modal {
            align-items: flex-end;
        }
        .profile-sheet {
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 24px 24px 0 0;
            background: linear-gradient(145deg, #1a1f3a 0%, #0a0e27 100%);
            border-top: 2px solid rgba(16, 185, 129, 0.3);
        }
        .profile-sheet::-webkit-scrollbar { display: none; }
        .profile-sheet { scrollbar-width: none; }

        /* Pull handle */
        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 12px auto 0;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0a0e27] via-[#1a1f3a] to-[#0f1629] overflow-x-hidden">

                            <button id="sec-dot-1b" onclick="switchSection(1)" class="h-3 rounded-full transition-all w-8 bg-emerald-400"></button>

    <script src="pwa-utils.js"></script>
    <script src="index.js"></script>

    <!-- Patch: sync section dots and tab styling to swipeable track -->
    <script>
        // Override switchSection to also drive the CSS track
        const _origSwitch = window.switchSection;
        window.switchSection = function(index) {
            const track = document.getElementById('swipeable-track');
            if (track) {
                track.style.transform = index === 0 ? 'translateX(0%)' : 'translateX(-50%)';
            }
            // sync secondary dots (in rankings panel)
            const d0b = document.getElementById('sec-dot-0b');
            const d1b = document.getElementById('sec-dot-1b');
            if (d0b && d1b) {
                if (index === 0) {
                    d0b.className = 'h-3 rounded-full transition-all w-8 bg-emerald-400';
                    d1b.className = 'h-3 rounded-full transition-all w-3 bg-white/30';
                } else {
                    d0b.className = 'h-3 rounded-full transition-all w-3 bg-white/30';
                    d1b.className = 'h-3 rounded-full transition-all w-8 bg-emerald-400';
                }
            }
            // sync player-count-badge
            const badge = document.getElementById('player-count-badge');
            const count = document.getElementById('player-count');
            if (badge && count) badge.textContent = count.textContent;

            if (_origSwitch) _origSwitch(index);
        };

        // Patch updatePlayerCount to also update the badge
        const _origUpdate = window.updatePlayerCount;
        window.updatePlayerCount = function() {
            if (_origUpdate) _origUpdate();
            const badge = document.getElementById('player-count-badge');
            const count = document.getElementById('player-count');
            if (badge && count) badge.textContent = count.textContent;
        };

        // Also init: ensure track starts at correct position
        document.addEventListener('DOMContentLoaded', () => {
            const track = document.getElementById('swipeable-track');
            if (track) track.style.transform = 'translateX(0%)';
        });

        // Swipe gesture on the whole track
        let _tx = 0, _ty = 0, _dragging = false;
        const wrapper = document.getElementById('swipeable-section-wrapper');
        if (wrapper) {
            wrapper.addEventListener('touchstart', e => {
                _tx = e.touches[0].clientX;
                _ty = e.touches[0].clientY;
                _dragging = false;
            }, { passive: true });
            wrapper.addEventListener('touchmove', e => {
                const dx = e.touches[0].clientX - _tx;
                const dy = e.touches[0].clientY - _ty;
                if (!_dragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) _dragging = true;
            }, { passive: true });
            wrapper.addEventListener('touchend', e => {
                if (!_dragging) return;
                const dx = e.changedTouches[0].clientX - _tx;
                const curSec = window.sectionIndex || 0;
                if (dx < -50 && curSec === 0) window.switchSection(1);
                else if (dx > 50 && curSec === 1) window.switchSection(0);
                _dragging = false;
            }, { passive: true });
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
